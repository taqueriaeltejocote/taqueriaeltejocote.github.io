<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taquería El Tejocote</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:'Montserrat',sans-serif;
overflow-x:hidden;
}

header{
text-align:center;
padding:60px 20px 40px;
border-bottom:2px solid #ffc400;
}

header h1{
font-family:'Playfair Display';
font-size:46px;
color:#ffc400;
margin:0;
letter-spacing:4px;
}

header p{
margin-top:10px;
font-size:16px;
color:#ddd;
}

.menu{
max-width:850px;
margin:auto;
padding:20px;
}

.item{
margin:60px 0;
opacity:0;
transform:translateY(70px);
transition:1s;
}

.item.visible{
opacity:1;
transform:translateY(0);
}

.item img{
width:100%;
border-radius:12px;
box-shadow:0 15px 40px rgba(255,200,0,0.25);
}

.section-title{
text-align:center;
font-size:28px;
color:#ffc400;
margin-top:70px;
font-family:'Playfair Display';
}

.map{
margin-top:40px;
text-align:center;
}

iframe{
width:90%;
max-width:850px;
height:350px;
border:0;
border-radius:10px;
}

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
color:white;
font-size:18px;
padding:14px 18px;
border-radius:40px;
text-decoration:none;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
font-weight:bold;
}

footer{
text-align:center;
padding:40px;
font-size:13px;
color:#888;
}

</style>
</head>

<body>

<header>

<h1>EL TEJOCOTE</h1>
<p>Servicio a domicilio</p>

</header>

<div class="menu">

<div class="item">
<img src="menu1.jpg">
</div>

<div class="item">
<img src="menu2.jpg">
</div>

<div class="item">
<img src="menu3.jpg">
</div>

<div class="item">
<img src="menu4.jpg">
</div>

<div class="item">
<img src="menu5.jpg">
</div>






<a class="whatsapp" href="https://wa.me/5657991351">
Pedir por WhatsApp
</a>

<footer>
Taquería El Tejocote® 
</footer>

<script>

const items = document.querySelectorAll(".item");

function reveal(){

items.forEach(item =>{

const windowHeight = window.innerHeight;
const elementTop = item.getBoundingClientRect().top;

if(elementTop < windowHeight - 100){
item.classList.add("visible");
}

});

}

window.addEventListener("scroll", reveal);
reveal();

</script>

</body>
</html>
